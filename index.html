<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Jurnal Tanah & Harapan</title>
    <!-- Import font Quicksand biar manis -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background buram ala meja kayu/papan -->
    <div id="diary-wrapper">
        <!-- Lubang binder buku catatan -->
        <div class="binder-holes">
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
        </div>

        <div id="game-container">
            <!-- Header Jurnal -->
            <div class="header">
                <h2 id="judul-babak">Memuat Jurnal...</h2>
            </div>

            <!-- Tempat Gambar (Render Blender-mu nanti masuk sini) -->
            <div class="scene-image-container">
                <img id="scene-image" src="https://via.placeholder.com/600x300/dcedc1/3e5641?text=Memuat+Gambar..." alt="Ilustrasi Cerita">
            </div>

            <!-- Area Teks Cerita -->
            <div id="story-area">
                <p id="teks-cerita"></p>
            </div>

            <!-- Area Tombol Pilihan -->
            <div id="options-area">
                <!-- Tombol di-generate JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
